<!DOCTYPE html>
<html lang="en-US">
<head>
    <!-- Meta tags -->
    <jcms:site:seotitle/>
    <!-- Fevicon -->
    <jcms:site:fevicon/>
    <!-- Css -->
    <link rel="stylesheet" href="assets/css/bootstrap.min.css" type="text/css">
    <link rel="stylesheet" href="assets/css/font.awesome.min.css" type="text/css">
    <link rel="stylesheet" href="assets/css/magnific.popup.css" type="text/css">
    <link rel="stylesheet" href="assets/css/owl.carousel.css" type="text/css">
    <link rel="stylesheet" href="assets/css/owl.theme.default.css" type="text/css">
    <link rel="stylesheet" href="assets/css/jquery-ui.css" type="text/css">
    <link rel="stylesheet" href="assets/css/style.min.css" type="text/css">
    <link rel="stylesheet" href="assets/css/responsive.min.css" type="text/css">
    <!-- Google Fonts -->
    <!--<link href='https://fonts.googleapis.com/css?family=Playfair+Display:400,400italic,700,700italic,900,900italic&amp;subset=latin,latin-ext' rel="stylesheet" type="text/css">    -->
    <!--<link href='https://fonts.googleapis.com/css?family=Lato:300,400,700,900&amp;subset=latin,latin-ext' rel="stylesheet" type="text/css">        -->

    <style>
        .panel-heading .accordion-toggle:after {
            /* symbol for "opening" panels */
            font-family: 'Glyphicons Halflings';  /* essential for enabling glyphicon */
            content: "\e114";    /* adjust as needed, taken from bootstrap.css */
            float: right;        /* adjust as needed */
            color: grey;         /* adjust as needed */
        }
        .panel-heading .accordion-toggle.collapsed:after {
            /* symbol for "collapsed" panels */
            content: "\e080";    /* adjust as needed, taken from bootstrap.css */
        }
    </style>
</head>

<body>
      <jcms:site:googleframe/>
    <!-- Site Back Top -->
    <div class="site-backtop" title="Back to top">
    	<i class="fa fa-angle-up"></i>
    </div>
    <!-- Site Back Top End -->

    <!-- Site Header -->
    <div class="site-header">
        <!-- Header Top -->
        <div class="header-top">
            <div class="header-contact">
                <div class="container">
                    <div class="row">
                        <div class="col-md-6">

                        </div>
                        <div class="col-md-6">
                            <jcms:module:menu-right/>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="header-bottom">
            <div class="container">
                <div class="row">
                    <div class="col-md-3">
                        <div class="header-logo">
                            <!-- Module -->
                            <jcms:site:logo/>
                        </div>
                    </div>

                    <div class="col-md-9">
                         <jcms:module:res-menu/>
                    </div>
                </div>
            </div>
        </div>
        <!-- Header Bottom End -->
    </div>
    <!-- Site Header End -->

    <!-- Site Main -->
    <div class="site-main site-main-white">
        <div class="banner-header section-padding valign bg-img innerpage2" data-background="images/static/contact-banner.jpg" style="background-image: url(&quot;images/static/contact-banner.jpg&quot;);">
            <div class="container">
                <div class="row">
                    <div class="col-md-12 caption ">
                        <h1>FAQ</h1>
                    </div>
                </div>
            </div>
        </div>
            <jcms:module:faqbreadcumb/>
        <div class="section">
	        <div class="widget-about--promo">
	            <div class="container">
	                <div class="wrapper-inner">
	                    <div class="panel-group" id="accordion">
	                        <jcms:module:faq:details/>

                        </div>
	                </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Site Main End -->

    <!-- Site Footer -->
    <div class="site-footer">
        <!-- Footer Top -->
        <div class="footer-bottom">
            <!-- Location module -->
            <jcms:module:footer-location/>
        </div>
        <!-- Footer Top End -->
    </div>
    <!-- Site Footer End -->

    <!-- Scripts -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery-ui.min.js"></script>
    <script src="assets/js/bootstrap.min.js"></script>
    <!-- Custom Scripts -->
    <script src="assets/js/custom.js"></script>
</body>
</html>
